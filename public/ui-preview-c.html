<!DOCTYPE html>
<html lang="zh">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>方案 C — Soft Premium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Inter,-apple-system,BlinkMacSystemFont,sans-serif}
body{display:flex;min-height:100vh;background:linear-gradient(135deg,#fffbeb 0%,#fef3c7 50%,#fef9c3 100%)}
aside{width:240px;background:linear-gradient(180deg,#1e293b 0%,#0f172a 100%);padding:24px 0;display:flex;flex-direction:column}
aside .logo{font-size:20px;font-weight:800;padding:0 20px;margin-bottom:28px;color:#f1f5f9;display:flex;align-items:center;gap:10px}
aside .logo span{background:linear-gradient(135deg,#818cf8,#6366f1);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
aside nav a{display:flex;align-items:center;gap:10px;padding:12px 20px;font-size:13px;color:#94a3b8;text-decoration:none;margin:4px 12px;border-radius:12px;transition:all .2s}
aside nav a.active{background:rgba(99,102,241,.15);color:#c7d2fe;font-weight:600}
aside nav a:hover:not(.active){background:rgba(255,255,255,.04)}
main{flex:1;padding:36px 40px}
h1{font-size:26px;font-weight:800;background:linear-gradient(135deg,#1e293b,#334155);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.sub{font-size:13px;color:#94a3b8;margin-bottom:28px}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:36px}
.card{background:#fff;border-radius:20px;padding:24px;box-shadow:0 1px 3px rgba(0,0,0,.04),0 4px 12px rgba(0,0,0,.03);transition:all .25s}
.card:hover{box-shadow:0 2px 6px rgba(0,0,0,.06),0 8px 24px rgba(0,0,0,.05);transform:translateY(-2px)}
.card .icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px}
.card .label{font-size:12px;color:#94a3b8;margin-bottom:4px}
.card .val{font-size:28px;font-weight:800;color:#1e293b}
.card .sub{font-size:11px;color:#6366f1;margin-top:4px}
table{width:100%;border-collapse:separate;border-spacing:0 6px}
th{text-align:left;font-size:12px;color:#94a3b8;padding:8px 16px}
td{font-size:14px;padding:16px;background:#fff;color:#334155}
td:first-child{border-radius:12px 0 0 12px}
td:last-child{border-radius:0 12px 12px 0}
.btn{padding:8px 18px;border-radius:12px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .2s;background:#f1f5f9;color:#475569}
.btn.primary{background:linear-gradient(135deg,#6366f1,#4f46e5);color:#fff}
.btn:hover{opacity:.9;transform:scale(1.02)}
tr:hover td{box-shadow:0 2px 8px rgba(0,0,0,.04)}
</style></head>
<body>
<aside>
  <div class="logo">🎓 <span>PJPC</span></div>
  <nav>
    <a href="#" class="active">📊 仪表板</a>
    <a href="#">👨‍🎓 学生管理</a>
    <a href="#">💰 财务管理</a>
    <a href="#">📚 课程</a>
    <a href="#">⚙️ 设置</a>
  </nav>
</aside>
<main>
  <h1>仪表板</h1>
  <p class="sub">美好的一天，欢迎回来 ☀️</p>
  <div class="grid">
    <div class="card">
      <div class="icon" style="background:#eef2ff;color:#6366f1">👨‍🎓</div>
      <div class="label">学生总数</div><div class="val">158</div><div class="sub">+3 名新生本月</div>
    </div>
    <div class="card">
      <div class="icon" style="background:#ecfdf5;color:#10b981">👨‍🏫</div>
      <div class="label">教师团队</div><div class="val">28</div><div class="sub">全部在职</div>
    </div>
    <div class="card">
      <div class="icon" style="background:#fef3c7;color:#f59e0b">💰</div>
      <div class="label">本月收入</div><div class="val">RM 42K</div><div class="sub">同比 +12%</div>
    </div>
    <div class="card">
      <div class="icon" style="background:#fce7f3;color:#ec4899">📈</div>
      <div class="label">出勤率</div><div class="val">94%</div><div class="sub">今日实时</div>
    </div>
  </div>
  <table>
    <tr><th>学生</th><th>年级</th><th>分院</th><th>状态</th><th></th></tr>
    <tr><td>张小明</td><td>Standard 4</td><td>BATU14</td><td><span style="background:#ecfdf5;color:#059669;padding:3px 10px;border-radius:20px;font-size:12px">● 在学</span></td><td><button class="btn">详情</button></td></tr>
    <tr><td>李华</td><td>Form 1</td><td>PU1</td><td><span style="background:#ecfdf5;color:#059669;padding:3px 10px;border-radius:20px;font-size:12px">● 在学</span></td><td><button class="btn">详情</button></td></tr>
    <tr><td>陈小美</td><td>Standard 2</td><td>BATU14</td><td><span style="background:#fef3c7;color:#d97706;padding:3px 10px;border-radius:20px;font-size:12px">● 请假</span></td><td><button class="btn primary">联系家长</button></td></tr>
  </table>
</main>
</body></html>
